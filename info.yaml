# TinyTapeout Project Info — SKY26a shuttle
# See https://tinytapeout.com/hdl/templates/ for field docs

project:
  title:      "IEEE SNK UART-Controlled PWM Generator"
  author:     "S. Naveen Kumaar"
  discord:    ""
  description: >
    An 8-channel software-configurable PWM generator driven by a UART serial
    interface (115200 8N1). The host sends a 2-byte packet [channel | duty]
    over RX; the chip replies with an ACK byte over TX. Eight independent
    PWM outputs appear on uo_out. A programmable clock prescaler on ui_in[7:5]
    sets the PWM base frequency. Designed for ~50% tile utilisation on SKY130.

  language: "SystemVerilog"

  # Tile count — 1 × 1 is default for simple designs
  tiles: "1x1"

  # Clock source — use the TT standard 50 MHz clock
  clock_hz: 50000000

  # Pin usage documentation
  # ui_in[4:0]  — prescaler[2:0] on [7:5], reserved [4:0]
  # uo_out[7:0] — PWM ch7..ch0
  # uio_in[0]   — UART RX (from host)
  # uio_out[0]  — UART TX (to host)
  # uio_oe[0]   — always output for TX

  pinout:
    ui_in:
      7: "prescaler[2]"
      6: "prescaler[1]"
      5: "prescaler[0]"
      4: "reserved"
      3: "reserved"
      2: "reserved"
      1: "reserved"
      0: "reserved"
    uo_out:
      7: "PWM channel 7"
      6: "PWM channel 6"
      5: "PWM channel 5"
      4: "PWM channel 4"
      3: "PWM channel 3"
      2: "PWM channel 2"
      1: "PWM channel 1"
      0: "PWM channel 0"
    uio_in:
      7: "unused"
      6: "unused"
      5: "unused"
      4: "unused"
      3: "unused"
      2: "unused"
      1: "unused"
      0: "UART RX"
    uio_out:
      7: "unused"
      6: "unused"
      5: "unused"
      4: "unused"
      3: "unused"
      2: "unused"
      1: "unused"
      0: "UART TX"
    uio_oe:
      7: "0"
      6: "0"
      5: "0"
      4: "0"
      3: "0"
      2: "0"
      1: "0"
      0: "1"

  # Source files (order matters for elaboration)
  source_files:
    - uart_rx.sv
    - uart_tx.sv
    - pwm_gen.sv
    - tt_um_snk_pwm_uart.sv

  top_module: "tt_um_snk_pwm_uart"
